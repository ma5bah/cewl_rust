name: Release

on:
  push:
    branches: [main]
    paths: [Cargo.toml]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      go: ${{ steps.r.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            if ! gh release view "$TAG" >/dev/null 2>&1; then
              gh release create "$TAG" \
                --target "$GITHUB_SHA" \
                --title  "$TAG" \
                --generate-notes
            fi
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping."
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title  "$TAG" \
              --generate-notes
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - if: startsWith(matrix.os, 'ubuntu')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
          runner: none

      - if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # taiki-e/upload-rust-binary-action leaves `assets` empty when tar/zip are all
      # "none", which blows up its script under bash nounset (`assets[@]` unbound).
      # Build once here; bundle + upload raw binaries ourselves.

      - name: Build release binaries (cewl + fab)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --bin cewl --bin fab --target "${{ matrix.target }}"

      # Linux / macOS: combined .tar.gz + raw executables.

      - name: Package & upload (bundle + raw + SHA256)
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          REL="target/${TARGET}/release"
          FILES=()

          sha256_out() {
            python3 -c "import hashlib,sys; h=hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest(); print(h + '  ' + sys.argv[2])" "$1" "$2"
          }

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            BUNDLE="cewl-fab-${TAG}-${TARGET}.zip"
            7z a -tzip -mx=9 "${BUNDLE}" "${REL}/cewl.exe" "${REL}/fab.exe"
            FILES+=("${BUNDLE}")
            sha256_out "${BUNDLE}" "$(basename "${BUNDLE}")" > "${BUNDLE}.sha256"
            FILES+=("${BUNDLE}.sha256")
            for BIN in cewl fab; do
              DST="${BIN}-${TARGET}.exe"
              cp "${REL}/${BIN}.exe" "${DST}"
              sha256_out "${DST}" "$(basename "${DST}")" > "${DST}.sha256"
              FILES+=("${DST}" "${DST}.sha256")
            done
          else
            BUNDLE="cewl-fab-${TAG}-${TARGET}.tar.gz"
            tar -czf "${BUNDLE}" -C "${REL}" cewl fab
            FILES+=("${BUNDLE}")
            sha256_out "${BUNDLE}" "$(basename "${BUNDLE}")" > "${BUNDLE}.sha256"
            FILES+=("${BUNDLE}.sha256")
            for BIN in cewl fab; do
              DST="${BIN}-${TARGET}"
              cp "${REL}/${BIN}" "${DST}"
              chmod +x "${DST}"
              sha256_out "${DST}" "$(basename "${DST}")" > "${DST}.sha256"
              FILES+=("${DST}" "${DST}.sha256")
            done
          fi

          gh release upload "${TAG}" "${FILES[@]}" --clobber
